name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Pack Arkn.Core
        run: dotnet pack src/Arkn.Core/Arkn.Core.csproj --configuration Release --no-build -o ./artifacts

      - name: Pack Arkn.Results
        run: dotnet pack src/Arkn.Results/Arkn.Results.csproj --configuration Release --no-build -o ./artifacts

      # Uncomment when ready to publish:
      # - name: Push to NuGet
      #   run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
